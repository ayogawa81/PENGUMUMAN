<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Jadwal Kegiatan Online Synchronized</title>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0f172a; color: #f8fafc; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden; position: relative;
        }
        header {
            background: linear-gradient(90deg, #1e3a8a, #0f172a);
            padding: 20px 40px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 4px solid #3b82f6;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .logo-title h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: 1px; color: #ffffff; text-transform: uppercase; }
        .logo-title p { color: #94a3b8; font-size: 1.1rem; margin-top: 5px; }
        .datetime-container {
            text-align: right; background: rgba(30, 41, 59, 0.7);
            padding: 10px 20px; border-radius: 12px; border: 1px solid #334155;
            display: flex; align-items: center; gap: 20px;
        }
        #clock { font-size: 2.5rem; font-weight: bold; color: #3b82f6; font-variant-numeric: tabular-nums; line-height: 1; }
        #date { font-size: 1.1rem; color: #cbd5e1; margin-top: 5px; font-weight: 500; }
        .btn-setting {
            background-color: #334155; color: #f8fafc; border: 1px solid #475569;
            padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s;
        }
        .btn-setting:hover { background-color: #3b82f6; border-color: #3b82f6; }
        main { flex: 1; padding: 40px; display: flex; flex-direction: column; }
        .table-container {
            width: 100%; background-color: #1e293b; border-radius: 16px;
            overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); border: 1px solid #334155;
        }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background-color: #0f172a; color: #3b82f6; font-size: 1.4rem; font-weight: 700; padding: 20px 25px; text-transform: uppercase; border-bottom: 3px solid #334155; }
        td { padding: 22px 25px; font-size: 1.3rem; color: #e2e8f0; border-bottom: 1px solid #334155; vertical-align: middle; }
        tr:nth-child(even) { background-color: #1e293b; }
        tr:nth-child(odd) { background-color: #162238; }
        .col-time { font-weight: bold; color: #f59e0b; width: 25%; }
        .col-event { width: 40%; font-weight: 500; }
        .col-room { width: 20%; color: #cbd5e1; }
        .status-badge { display: inline-block; padding: 6px 16px; border-radius: 30px; font-size: 1rem; font-weight: bold; text-transform: uppercase; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .status-ongoing { background-color: rgba(59, 130, 246, 0.2); color: #3b82f6; border: 1px solid #3b82f6; }
        .status-waiting { background-color: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid #f59e0b; }
        .status-done { background-color: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981; }

        /* MODAL PANEL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.75);
            display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background-color: #1e293b; width: 90%; max-width: 650px; max-height: 90vh; border-radius: 16px; border: 1px solid #475569; padding: 25px; display: flex; flex-direction: column; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .modal-header h2 { font-size: 1.5rem; color: #3b82f6; }
        .btn-close { background: none; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer; }
        
        .form-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group input { background-color: #0f172a; border: 1px solid #334155; color: #f8fafc; padding: 12px; border-radius: 6px; font-size: 1rem; width: 100%; }
        .btn-add { background-color: #10b981; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 20px; font-size: 1rem; }
        .btn-add:disabled { background-color: #475569; cursor: not-allowed; }
        .schedule-manager-list { flex: 1; overflow-y: auto; border-top: 1px solid #334155; padding-top: 15px; }
        .manager-item { display: flex; justify-content: space-between; align-items: center; background-color: #0f172a; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #2d3748; gap: 10px; }
        .manager-item-text { font-size: 0.95rem; color: #cbd5e1; flex: 1; }
        .btn-delete { background-color: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="logo-title">
            <h1>JADWAL KEGIATAN & AGENDA UTAMA</h1>
            <p>Silakan periksa waktu dan lokasi ruangan Anda</p>
        </div>
        <div class="datetime-container">
            <div>
                <div id="clock">00:00:00</div>
                <div id="date">Memuat Tanggal...</div>
            </div>
            <button class="btn-setting" onclick="toggleModal(true)">⚙️ Setting</button>
        </div>
    </header>

    <main>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 25%;">Hari, Tanggal & Waktu</th>
                        <th style="width: 40%;">Nama Kegiatan / Agenda</th>
                        <th style="width: 20%;">Lokasi / Ruang</th>
                        <th style="width: 15%; text-align: center;">Status</th>
                    </tr>
                </thead>
                <tbody id="main-table-body">
                    <tr><td colspan="4" style="text-align: center; color: #94a3b8;">Menghubungkan ke GitHub Internal...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <div class="modal-overlay" id="settingModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙️ Pengaturan Jadwal Global (GitHub Repo)</h2>
                <button class="btn-close" onclick="toggleModal(false)">✕</button>
            </div>
            <div class="form-group">
                <div class="form-row">
                    <input type="text" id="inputHariTgl" placeholder="Contoh: Senin, 15 Juni">
                    <input type="text" id="inputWaktu" placeholder="Contoh: 08:30 - 12:00">
                </div>
                <input type="text" id="inputKegiatan" placeholder="Nama Agenda / Kegiatan Utama">
                <input type="text" id="inputLokasi" placeholder="Lokasi Ruang / Tempat">
            </div>
            <button class="btn-add" id="btnAdd" onclick="addNewSchedule()">＋ Tambahkan ke Semua Layar</button>
            <div class="schedule-manager-list" id="managerList"></div>
        </div>
    </div>

            currentMinutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${currentHours}:${currentMinutes}:${String(now.getSeconds()).padStart(2, '0')}`;

            document.getElementById('date').textContent = now.toLocaleDateString('id-ID', options);

            updateStatusBadges(currentHours, currentMinutes);
